<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Der Sommelier – Ein Wein-RPG</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="game-root"></div>

  <script src="js/data.js"></script>
  <script src="js/questions_lv0.js"></script>
  <script src="js/questions_lv1.js"></script>
  <script src="js/questions_lv2.js"></script>
  <script src="js/questions_lv3.js"></script>
  <script src="js/questions_lv4.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/scenes.js"></script>
  <script>
    // Viewport scaler: fit 1920×1080 game to any screen
    (function() {
      const GAME_W = 1920, GAME_H = 1080;
      const root = document.getElementById('game-root');
      function scaleGame() {
        const sw = window.innerWidth, sh = window.innerHeight;
        const scale = Math.min(sw / GAME_W, sh / GAME_H);
        root.style.transform = 'scale(' + scale + ')';
      }
      scaleGame();
      window.addEventListener('resize', scaleGame);
    })();
    // Boot the game
    render();
  </script>
</body>
</html>
